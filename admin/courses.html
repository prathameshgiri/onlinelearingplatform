<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Management - LearnHub Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>ðŸ›¡ï¸</text></svg>">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <div class="admin-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg><span>LearnHub</span></div>
      </div>
      <div class="sidebar-label">Main Menu</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link"><span class="sidebar-link-icon">📊</span><span>Dashboard</span></a>
        <a href="users.html" class="sidebar-link"><span class="sidebar-link-icon">👥</span><span>Users</span></a>
        <a href="courses.html" class="sidebar-link active"><span class="sidebar-link-icon">📚</span><span>Courses</span></a>
        <a href="enrollments.html" class="sidebar-link"><span class="sidebar-link-icon">🎓</span><span>Enrollments</span></a>
        <a href="contacts.html" class="sidebar-link"><span class="sidebar-link-icon">📬</span><span>Contacts</span></a>
        <a href="activity.html" class="sidebar-link"><span class="sidebar-link-icon"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span><span>Activity Log</span></a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-admin-info">
          <div class="sidebar-admin-avatar" id="adminAvatar">A</div>
          <div><div class="sidebar-admin-name" id="adminName">Admin</div><div class="sidebar-admin-role">Administrator</div></div>
        </div>
        <button class="sidebar-logout-btn" onclick="adminLogout()">🚪 Sign Out</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div class="topbar-left"><h1>Course Management</h1><p>Add, edit, and manage all courses</p></div>
        <div class="topbar-right">
          <div class="topbar-search"><input type="text" id="courseSearch" placeholder="Search courses..."></div>
          <button class="btn btn-primary" onclick="openAddCourseModal()">+ Add Course</button>
          <button class="dark-mode-btn" id="darkModeBtn" onclick="toggleDarkMode()">🌙</button>
        </div>
      </div>

      <div class="page-content">
        <div class="data-card">
          <div class="data-card-header">
            <h3 class="data-card-title">All Courses (<span id="courseCount">0</span>)</h3>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th>Course</th>
                <th>Category</th>
                <th>Level</th>
                <th>Students</th>
                <th>Rating</th>
                <th>Price</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="coursesTableBody">
              <tr><td colspan="7" style="text-align: center; padding: 40px;">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Course Modal -->
  <div class="modal-overlay" id="courseModal">
    <div class="modal" style="max-width: 600px;">
      <div class="modal-header">
        <h3 class="modal-title" id="courseModalTitle">Add New Course</h3>
        <button class="modal-close" onclick="closeModal('courseModal')">Ã—</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="courseId">
        <div class="form-group">
          <label class="form-label">Course Title *</label>
          <input type="text" class="form-input" id="courseTitle" placeholder="e.g., Complete Web Development Bootcamp">
        </div>
        <div class="form-group">
          <label class="form-label">Description *</label>
          <textarea class="form-textarea" id="courseDescription" placeholder="Course description..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Instructor *</label>
            <input type="text" class="form-input" id="courseInstructor" placeholder="Instructor name">
          </div>
          <div class="form-group">
            <label class="form-label">Category *</label>
            <select class="form-select" id="courseCategory">
              <option value="">Select category</option>
              <option value="Web Development">Web Development</option>
              <option value="Data Science">Data Science</option>
              <option value="Design">Design</option>
              <option value="Cloud Computing">Cloud Computing</option>
              <option value="Mobile Development">Mobile Development</option>
              <option value="Cybersecurity">Cybersecurity</option>
              <option value="Marketing">Marketing</option>
              <option value="Blockchain">Blockchain</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Level</label>
            <select class="form-select" id="courseLevel">
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Duration</label>
            <input type="text" class="form-input" id="courseDuration" placeholder="e.g., 42 hours">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Lessons</label>
            <input type="number" class="form-input" id="courseLessons" placeholder="Number of lessons">
          </div>
          <div class="form-group">
            <label class="form-label">Price (₹)</label>
            <input type="number" class="form-input" id="coursePrice" placeholder="Course price">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Image URL</label>
          <input type="url" class="form-input" id="courseImage" placeholder="https://...">
        </div>
        <div class="form-group">
          <label class="form-label">Tags (comma separated)</label>
          <input type="text" class="form-input" id="courseTags" placeholder="e.g., React, Node.js, JavaScript">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('courseModal')">Cancel</button>
        <button class="btn btn-primary" id="saveCourseBtn" onclick="saveCourse()">Save Course</button>
      </div>
    </div>
  </div>

  <script src="js/admin-utils.js"></script>
  <script src="js/admin-courses.js"></script>
</body>
</html>
