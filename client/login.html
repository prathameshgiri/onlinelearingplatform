<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your LearnHub account">
  <title>Login - LearnHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">📚</div>
        <h2>Welcome Back</h2>
        <p>Log in to continue your learning journey</p>
      </div>

      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required>
          <div class="form-error" id="emailError">Please enter a valid email</div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
          <div class="form-error" id="passwordError">Password is required</div>
        </div>
        <button type="submit" class="auth-submit" id="submitBtn">
          Log In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Sign up for free</a>
      </div>

    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
