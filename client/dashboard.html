<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your personalized learning dashboard on LearnHub">
  <title>My Dashboard - LearnHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
  <div class="page-loader" id="pageLoader"><div class="loader-spinner"></div></div>
  <div class="toast-container" id="toastContainer"></div>

  <!-- Navigation -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        <span>LearnHub</span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="courses.html">Courses</a></li>
        <li><a href="dashboard.html" class="active">Dashboard</a></li>
      </ul>
      <div class="nav-actions">
        <button class="dark-mode-toggle" id="darkModeToggle" title="Toggle Dark Mode">🌙</button>
        <div id="authButtons" style="display: none;">
          <a href="login.html" class="nav-auth-btn nav-login-btn">Log In</a>
          <a href="register.html" class="nav-auth-btn nav-signup-btn">Sign Up</a>
        </div>
        <div class="nav-user-menu" id="userMenu">
          <div class="nav-user-avatar" id="userAvatar">J</div>
          <span class="nav-user-name" id="userName">John</span>
          <button class="nav-auth-btn nav-login-btn" id="logoutBtn" style="font-size: 0.85rem;">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Dashboard -->
  <section class="dashboard">
    <div class="container">
      <div class="dashboard-header">
        <div class="dashboard-welcome">
          <h1 id="dashboardGreeting">Welcome back! 👋</h1>
          <p>Track your progress and continue learning</p>
        </div>
      </div>

      <div class="dashboard-stats" id="dashboardStats">
        <div class="dashboard-stat-card">
          <div class="dashboard-stat-icon" style="background: rgba(108, 92, 231, 0.1);">📚</div>
          <div class="dashboard-stat-value" id="statEnrolled">0</div>
          <div class="dashboard-stat-label">Enrolled Courses</div>
        </div>
        <div class="dashboard-stat-card">
          <div class="dashboard-stat-icon" style="background: rgba(0, 206, 201, 0.1);">📊</div>
          <div class="dashboard-stat-value" id="statAvgProgress">0%</div>
          <div class="dashboard-stat-label">Average Progress</div>
        </div>
        <div class="dashboard-stat-card">
          <div class="dashboard-stat-icon" style="background: rgba(253, 121, 168, 0.1);"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg></div>
          <div class="dashboard-stat-value" id="statCompleted">0</div>
          <div class="dashboard-stat-label">Completed</div>
        </div>
      </div>

      <h2 class="dashboard-section-title">My Courses</h2>
      <div class="enrolled-courses-grid" id="enrolledCoursesGrid">
        <!-- Will be populated by JS -->
      </div>

      <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-state-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; vertical-align: middle; margin-right: 8px;"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
        <h3>No Courses Yet</h3>
        <p>Start your learning journey by enrolling in a course</p>
        <a href="courses.html" class="btn btn-primary">Browse Courses</a>
      </div>
    </div>
  </section>

  <script src="js/utils.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
